server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore/moa-ssl.p12
server.ssl.key-store-password=moa1234
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=moa-server

app.frontend-url=https://localhost:5173
app.email.verify-base-url=https://localhost:8443/api/auth/verify-email

app.cors.allowed-origins=https://localhost:5173,https://localhost:3000

oauth.kakao.redirect-uri=https://localhost:8443/api/oauth/kakao/callback
oauth.google.redirect-uri=https://localhost:8443/api/oauth/google/callback

server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.secure=false

# WebAuthn (Passkey) - rpId must match the effective domain of the frontend
app.webauthn.rp-id=localhost
app.webauthn.rp-name=MOA
app.webauthn.allowed-origins=https://localhost:5173

# Toss Webhook - 로컬에서는 실제 웹훅이 오지 않으므로 더미값으로 기동만 허용
toss.webhook-secret=local-dev-dummy-secret
