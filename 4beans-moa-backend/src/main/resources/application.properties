spring.application.name=moa

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/moa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

mybatis.mapper-locations=classpath*:sql/*.xml

# server config
# app.upload.root-dir=/opt/moa/uploads
# eclipse config
app.upload.root-dir=${user.dir}/uploads
app.upload.user.profile-dir=${app.upload.root-dir}/user/profile
app.upload.user.profile-url-prefix=/uploads/user/profile

app.upload.product-image-dir=${app.upload.root-dir}/product-image
app.upload.product-image-url-prefix=/uploads/product-image

app.upload.community.inquiry-dir=${user.dir}/uploads/community/inquiry/
app.upload.community.inquiry-url-prefix=/uploads/community/inquiry/
app.upload.community.answer-dir=${user.dir}/uploads/community/answer/
app.upload.community.answer-url-prefix=/uploads/community/answer/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

resend.from-address=no-reply@onesun.shop
resend.from-name=MOA

openbanking.api.url=https://testapi.openbanking.or.kr
openbanking.callback-url=https://localhost:8443/api/openbanking/callback
openbanking.institution-code=M202201886
openbanking.platform.bank-code=097
openbanking.platform.account-number=1234567890
openbanking.platform.account-holder=MOA\uD50C\uB7AB\uD3FC
openbanking.platform.client-num=MOAPLATFORM001

# =============================================
# Redis
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.config.import=optional:application-secret.properties
#spring.profiles.active=prod
spring.profiles.active=local
# =============================================
# AI / LLM — 제공자 교체는 아래 4줄만 수정
# 제공자별 base-url:
#   NVIDIA NIM   : https://integrate.api.nvidia.com/v1
#   OpenRouter   : https://openrouter.ai/api/v1
#   OpenAI       : https://api.openai.com/v1
# =============================================
ai.provider=nvidia_nim
ai.base-url=https://integrate.api.nvidia.com/v1
ai.model=meta/llama-3.1-8b-instruct
ai.api-key=${AI_API_KEY:}
ai.timeout-seconds=30
ai.max-tokens=1024
ai.temperature=0.5

app.security.aes-key=${APP_SECURITY_AES_KEY:12345678901234567890123456789012}

# =============================================
# Actuator
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.app.name=MOA
management.info.app.version=1.0.0
management.info.app.description=OTT \uAD6C\uB3C5 \uD30C\uD2F0 \uD50C\uB7AB\uD3FC

# =============================================
# Swagger / SpringDoc
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true

# =============================================
# Flyway
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true


# WebAuthn / Passkey
app.webauthn.rp-id=localhost
app.webauthn.rp-name=MOA
app.webauthn.allowed-origins=https://localhost:5173
