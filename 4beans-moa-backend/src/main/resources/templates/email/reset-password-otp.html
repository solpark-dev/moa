<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOA 비밀번호 재설정</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.08);overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px;text-align:left;border-bottom:1px solid #eef0f3;">
                <div style="font-size:22px;font-weight:800;letter-spacing:-0.4px;color:#111827;">MOA</div>
                <div style="margin-top:6px;font-size:14px;color:#6b7280;">비밀번호 재설정 인증 코드</div>
              </td>
            </tr>

            <tr>
              <td style="padding:32px 28px;">
                <p style="margin:0 0 8px;font-size:15px;color:#111827;line-height:1.6;">
                  아래 <strong>6자리 인증 코드</strong>를 입력하여 비밀번호 재설정을 완료해주세요.
                </p>
                <p style="margin:0 0 24px;font-size:13px;color:#9ca3af;">
                  코드는 <strong>10분</strong> 동안 유효하며, 5회 오입력 시 만료됩니다.
                </p>

                <div style="text-align:center;background:#f0f4ff;border:2px solid #635bff;border-radius:16px;padding:28px 20px;">
                  <div style="font-size:42px;font-weight:800;letter-spacing:12px;color:#635bff;font-variant-numeric:tabular-nums;">
                    {{otp}}
                  </div>
                </div>

                <p style="margin:20px 0 0;font-size:12px;color:#9ca3af;text-align:center;line-height:1.6;">
                  본인이 요청하지 않은 경우 이 메일을 무시하세요.<br />
                  계정은 안전하게 유지됩니다.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:18px 28px;background:#f9fafb;border-top:1px solid #eef0f3;font-size:12px;color:#9ca3af;line-height:1.6;">
                본 메일은 발신 전용입니다.<br />© 2025 MOA
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
