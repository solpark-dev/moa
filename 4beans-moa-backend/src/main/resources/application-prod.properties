server.port=8080
server.ssl.enabled=false

app.frontend-url=https://onesun.shop
app.email.verify-base-url=https://onesun.shop/email-verified

app.cors.allowed-origins=https://onesun.shop,https://www.onesun.shop

oauth.kakao.redirect-uri=https://onesun.shop/api/oauth/kakao/callback
oauth.google.redirect-uri=https://onesun.shop/api/oauth/google/callback

server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# ── Uploads ──────────────────────────────────────────────────────────
app.upload.root-dir=/opt/moa/uploads

# ── Logging ──────────────────────────────────────────────────────────
# Docker 볼륨 마운트 경로 또는 EC2 직접 경로로 설정
# .env에 LOG_PATH=/var/log/moa 형태로 주입
logging.file.path=${LOG_PATH:/var/log/moa}

# ── Flyway ───────────────────────────────────────────────────────────
# 첫 배포 시: RDS에 V1, V2 마이그레이션 수동 실행 후 이 값을 false로 유지
# 명령: docker-compose run --rm backend java -jar app.war --spring.flyway.enabled=true --spring.profiles.active=prod --spring.flyway.validate-on-migrate=false
spring.flyway.enabled=false

# ── WebAuthn / Passkey ───────────────────────────────────────────────
app.webauthn.rp-id=onesun.shop
app.webauthn.rp-name=MOA
app.webauthn.allowed-origins=https://onesun.shop,https://www.onesun.shop

# ── Swagger (프로덕션에서 완전 비활성화) ─────────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
