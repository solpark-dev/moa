# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name onesun.shop www.onesun.shop;

    # Let's Encrypt 인증용 경로 (certbot이 사용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name onesun.shop www.onesun.shop;

    ssl_certificate     /etc/letsencrypt/live/onesun.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onesun.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # 모든 요청을 frontend 컨테이너로
    location / {
        proxy_pass         http://localhost:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
